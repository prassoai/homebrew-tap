name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]

# Payload:
#   name: formula name (e.g. "murmur")
#   version: semver (e.g. "0.1.0")
#   homepage: project URL
#   description: formula description
#   repo: source repo for release URLs (e.g. "prassoai/murmuration")
#   binary: name of the installed binary (e.g. "murmur")
#   artifacts: [{"os": "darwin", "arch": "arm64", "sha256": "..."}, ...]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate formula
        run: |
          python3 - <<'PYEOF'
          import json, os, sys

          payload = json.loads(os.environ["PAYLOAD"])
          name = payload["name"]
          version = payload["version"]
          homepage = payload.get("homepage", "")
          desc = payload.get("description", "")
          repo = payload["repo"]
          binary = payload.get("binary", name)
          artifacts = payload["artifacts"]

          # Ruby class name: capitalize first letter of each word
          class_name = "".join(w.capitalize() for w in name.split("-"))

          # Group artifacts by os
          by_os = {}
          for a in artifacts:
              by_os.setdefault(a["os"], []).append(a)

          # Map os/arch to Homebrew DSL
          os_method = {"darwin": "on_macos", "linux": "on_linux"}
          arch_method = {"arm64": "on_arm", "amd64": "on_intel"}

          lines = []
          lines.append(f'class {class_name} < Formula')
          lines.append(f'  desc "{desc}"')
          lines.append(f'  homepage "{homepage}"')
          lines.append(f'  version "{version}"')
          lines.append('')

          for os_name in ["darwin", "linux"]:
              if os_name not in by_os:
                  continue
              lines.append(f'  {os_method[os_name]} do')
              for a in sorted(by_os[os_name], key=lambda x: x["arch"]):
                  arch = a["arch"]
                  sha = a["sha256"]
                  url = f'https://github.com/{repo}/releases/download/v{version}/{binary}-{os_name}-{arch}'
                  lines.append(f'    {arch_method[arch]} do')
                  lines.append(f'      url "{url}"')
                  lines.append(f'      sha256 "{sha}"')
                  lines.append(f'    end')
              lines.append(f'  end')
              lines.append('')

          lines.append(f'  def install')
          lines.append(f'    bin.install stable.url.split("/").last => "{binary}"')
          lines.append(f'  end')
          lines.append('')
          lines.append(f'  test do')
          lines.append(f'    assert_match version.to_s, shell_output("#{{bin}}/{binary} version")')
          lines.append(f'  end')
          lines.append(f'end')
          lines.append('')

          formula_path = f'Formula/{name}.rb'
          with open(formula_path, "w") as f:
              f.write("\n".join(lines))
          print(f"Wrote {formula_path}")
          PYEOF
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload) }}

      - name: Commit and push
        run: |
          NAME="${{ github.event.client_payload.name }}"
          VERSION="${{ github.event.client_payload.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "${NAME} ${VERSION}"
          git push
